<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HERALD Newsletter Studio</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08090d;
      --panel: rgba(18, 20, 28, 0.94);
      --panel-2: rgba(10, 11, 18, 0.96);
      --border: rgba(201, 168, 76, 0.24);
      --text: #f2eee6;
      --muted: #a29a8d;
      --accent: #c9a84c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(201, 168, 76, 0.14), transparent 30%),
        radial-gradient(circle at bottom right, rgba(77, 102, 255, 0.12), transparent 25%),
        var(--bg);
      color: var(--text);
    }
    .shell {
      display: grid;
      grid-template-columns: minmax(320px, 420px) 1fr;
      min-height: 100vh;
    }
    .panel {
      padding: 24px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(18px);
    }
    .preview {
      padding: 24px;
      background: var(--panel-2);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 700;
    }
    p, label {
      color: var(--muted);
      line-height: 1.5;
    }
    .card {
      margin-top: 18px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.02);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
    }
    textarea, select, input[type="text"], input[type="file"] {
      width: 100%;
      margin-top: 8px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font: inherit;
    }
    textarea { min-height: 220px; resize: vertical; }
    .tabs {
      display: flex;
      gap: 8px;
      margin-top: 18px;
    }
    .tabs button.active {
      color: #08090d;
      background: var(--accent);
    }
    .editor-pane[hidden] { display: none; }
    .section-editor { margin-top: 16px; }
    .section-editor textarea { min-height: 180px; }
    .row {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    button, .link-button {
      appearance: none;
      border: 1px solid rgba(201, 168, 76, 0.34);
      background: linear-gradient(180deg, rgba(201, 168, 76, 0.16), rgba(201, 168, 76, 0.08));
      color: var(--text);
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      font: inherit;
      text-decoration: none;
    }
    button.secondary, .link-button.secondary {
      border-color: rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
    }
    .status {
      margin-top: 12px;
      font-size: 13px;
      color: var(--accent);
    }
    iframe {
      width: 100%;
      min-height: calc(100vh - 48px);
      border: 1px solid var(--border);
      border-radius: 18px;
      background: white;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    }
    @media (max-width: 980px) {
      .shell { grid-template-columns: 1fr; }
      .panel { border-right: 0; border-bottom: 1px solid var(--border); }
      iframe { min-height: 60vh; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="panel">
      <h1>Newsletter Studio</h1>
      <p>Edit the newsletter in plain text and watch the HTML preview update automatically.</p>

      <div class="tabs" role="tablist" aria-label="Newsletter editor mode">
        <button id="plainTab" class="active" type="button">Plain text</button>
        <button id="htmlTab" class="secondary" type="button">HTML</button>
      </div>

      <div id="plainEditor" class="editor-pane">
        <div class="card">
          <strong>Newsletter copy</strong>
          <p>Edit any section below. Changes are rebuilt and saved automatically.</p>
          <div id="sectionEditors"></div>
          <div class="actions">
            <button id="savePlain">Save changes</button>
          </div>
        </div>
      </div>

      <div id="htmlEditor" class="card editor-pane" hidden>
        <label for="rawHtml">HTML</label>
        <textarea id="rawHtml" spellcheck="false"></textarea>
        <div class="actions">
          <button id="applyHtml">Apply HTML</button>
          <button id="saveIssue">Save to HERALD</button>
          <button id="downloadHtml" class="secondary">Download HTML</button>
        </div>
      </div>

      <div class="card">
        <label for="imageFile">Image</label>
        <input id="imageFile" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
        <label for="imageCaption">Caption</label>
        <input id="imageCaption" type="text" placeholder="Optional image caption">
        <div class="row">
          <div>
            <label for="imagePosition">Placement</label>
            <select id="imagePosition">
              <option value="top">Top</option>
              <option value="below-headline">Below headline</option>
              <option value="middle">Middle</option>
              <option value="bottom">Bottom</option>
            </select>
          </div>
          <div>
            <label for="imageWidth">Width</label>
            <select id="imageWidth">
              <option value="100%">Full</option>
              <option value="80%">Large</option>
              <option value="60%">Medium</option>
            </select>
          </div>
        </div>
        <div class="actions">
          <button id="insertImage">Insert Image</button>
        </div>
      </div>

      <div class="status" id="status">Loading preview…</div>
    </aside>

    <main class="preview">
      <iframe id="previewFrame" title="Newsletter preview"></iframe>
    </main>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const previewPath = params.get('preview') || '';
      const issueId = params.get('issue') || '';
      const rawHtml = document.getElementById('rawHtml');
      const previewFrame = document.getElementById('previewFrame');
      const status = document.getElementById('status');
      const sectionEditors = document.getElementById('sectionEditors');
      const plainEditor = document.getElementById('plainEditor');
      const htmlEditor = document.getElementById('htmlEditor');
      const plainTab = document.getElementById('plainTab');
      const htmlTab = document.getElementById('htmlTab');
      let currentHtml = '';
      let currentSections = [];
      let saveTimer = null;

      function setStatus(text) {
        status.textContent = text;
      }

      function updatePreview(html) {
        currentHtml = html;
        rawHtml.value = html;
        previewFrame.srcdoc = html;
        setStatus('Preview updated.');
      }

      function setEditorMode(mode) {
        const plain = mode === 'plain';
        plainEditor.hidden = !plain;
        htmlEditor.hidden = plain;
        plainTab.classList.toggle('active', plain);
        htmlTab.classList.toggle('active', !plain);
      }

      function renderSectionEditors(sections) {
        currentSections = sections || [];
        sectionEditors.innerHTML = '';
        currentSections.forEach(function (section, index) {
          const wrapper = document.createElement('div');
          wrapper.className = 'section-editor';
          const label = document.createElement('label');
          label.textContent = section.title || section.id || ('Section ' + (index + 1));
          const textarea = document.createElement('textarea');
          textarea.value = section.content || '';
          textarea.spellcheck = true;
          textarea.dataset.sectionIndex = String(index);
          textarea.addEventListener('input', function () {
            currentSections[index].content = textarea.value;
            clearTimeout(saveTimer);
            saveTimer = setTimeout(function () { saveStructuredIssue(true); }, 650);
          });
          wrapper.appendChild(label);
          wrapper.appendChild(textarea);
          sectionEditors.appendChild(wrapper);
        });
      }

      async function loadPreview() {
        if (issueId) {
          try {
            const issueResponse = await fetch(
              '/herald/studio/issues/' + encodeURIComponent(issueId) + '/data',
              { method: 'POST' }
            );
            if (issueResponse.ok) {
              const issue = await issueResponse.json();
              renderSectionEditors(issue.sections || []);
              if (issue.html) updatePreview(issue.html);
              setStatus('Draft loaded. Plain-text changes save automatically.');
              return;
            }
          } catch (error) {
            setStatus('Could not load stored issue data. Loading HTML preview instead.');
          }
        }
        if (!previewPath) {
          setStatus('No preview URL provided. Paste HTML to begin.');
          return;
        }
        try {
          const response = await fetch(previewPath);
          const html = await response.text();
          updatePreview(html);
          setStatus('Preview loaded from current draft.');
        } catch (error) {
          setStatus('Could not load preview HTML.');
        }
      }

      async function saveStructuredIssue(automatic) {
        if (!issueId || !currentSections.length) {
          if (!automatic) setStatus('This draft has no editable text sections.');
          return;
        }
        setStatus(automatic ? 'Updating preview...' : 'Saving text changes...');
        const response = await fetch('/herald/studio/issues/' + encodeURIComponent(issueId), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sections: currentSections })
        });
        const payload = await response.json();
        if (!response.ok) {
          setStatus(payload.detail || 'Save failed.');
          return;
        }
        if (payload.html) updatePreview(payload.html);
        setStatus('Text saved. HTML preview is current.');
      }

      function downloadHtml() {
        const blob = new Blob([rawHtml.value], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = 'herald-newsletter-edited.html';
        anchor.click();
        URL.revokeObjectURL(url);
      }

      function buildImageBlock(src, caption, width) {
        const captionHtml = caption
          ? '<p style="margin:10px 0 0;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.5;color:#666666;">' +
              caption.replace(/</g, '&lt;').replace(/>/g, '&gt;') +
            '</p>'
          : '';
        return (
          '<div data-herald-studio-image="true" style="margin:24px auto;text-align:center;">' +
            '<img src="' + src + '" alt="Newsletter visual" style="display:block;margin:0 auto;max-width:' + width + ';width:' + width + ';height:auto;border-radius:16px;" />' +
            captionHtml +
          '</div>'
        );
      }

      function insertImage(dataUrl) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(rawHtml.value, 'text/html');
        doc.querySelectorAll('[data-herald-studio-image="true"]').forEach((node) => node.remove());

        const placement = document.getElementById('imagePosition').value;
        const caption = document.getElementById('imageCaption').value.trim();
        const width = document.getElementById('imageWidth').value;
        const imageHtml = buildImageBlock(dataUrl, caption, width);

        const wrapper = doc.createElement('div');
        wrapper.innerHTML = imageHtml;
        const block = wrapper.firstChild;

        const body = doc.body;
        const headline = doc.querySelector('h1, h2, p');
        const paragraphs = Array.from(doc.querySelectorAll('p'));

        if (placement === 'top' && body.firstChild) {
          body.insertBefore(block, body.firstChild);
        } else if (placement === 'below-headline' && headline && headline.parentNode) {
          headline.parentNode.insertBefore(block, headline.nextSibling);
        } else if (placement === 'middle' && paragraphs.length > 1) {
          const midpoint = paragraphs[Math.floor(paragraphs.length / 2)];
          midpoint.parentNode.insertBefore(block, midpoint);
        } else {
          body.appendChild(block);
        }

        updatePreview('<!DOCTYPE html>\n' + doc.documentElement.outerHTML);
      }

      async function uploadImage(file) {
        const formData = new FormData();
        formData.append('image', file);
        const response = await fetch('/herald/studio/upload', {
          method: 'POST',
          body: formData
        });
        if (!response.ok) throw new Error('Image upload failed');
        return response.json();
      }

      async function saveIssue() {
        if (!issueId) {
          setStatus('This preview is not linked to a stored issue. Download the HTML instead.');
          return;
        }
        setStatus('Saving draft...');
        const response = await fetch('/herald/studio/issues/' + encodeURIComponent(issueId), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ html: rawHtml.value })
        });
        const payload = await response.json();
        if (!response.ok) {
          setStatus(payload.detail || 'Save failed.');
          return;
        }
        setStatus('Saved to HERALD.');
      }

      document.getElementById('applyHtml').addEventListener('click', function () {
        updatePreview(rawHtml.value);
      });

      document.getElementById('downloadHtml').addEventListener('click', downloadHtml);
      document.getElementById('saveIssue').addEventListener('click', saveIssue);
      document.getElementById('savePlain').addEventListener('click', function () {
        clearTimeout(saveTimer);
        saveStructuredIssue(false);
      });
      plainTab.addEventListener('click', function () { setEditorMode('plain'); });
      htmlTab.addEventListener('click', function () { setEditorMode('html'); });

      document.getElementById('insertImage').addEventListener('click', function () {
        const file = document.getElementById('imageFile').files[0];
        if (!file) {
          setStatus('Choose an image first.');
          return;
        }
        setStatus('Uploading image...');
        uploadImage(file).then(function (payload) {
          insertImage(payload.url);
          setStatus('Image inserted. Save to HERALD when ready.');
        }).catch(function () {
          setStatus('Image upload failed.');
        });
      });

      loadPreview();
    })();
  </script>
</body>
</html>
